<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivo: Cumpleaños Mishell</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-grid"></div>

    <!-- Escena Envelope (Sobre Confidential) -->
    <div class="envelope-wrapper" id="envelope-wrapper">
        <div class="envelope-info">Cargando Archivo Clasificado...</div>
        <div class="envelope">
            <div class="envelope-flap" id="flap"></div>
            <div class="envelope-body">
                <div class="envelope-seal" id="seal">VER</div>
                <div class="envelope-stamp">CONFIDENCIAL</div>
            </div>
            <div class="letter" id="letter"></div>
        </div>
    </div>

    <!-- Contenido principal interactivo -->
    <div class="main-content hidden" id="main-content">
        <div class="tech-card">
            <div class="card-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="header-title">terminal-jimmy.exe</span>
            </div>
            <h1 class="title">¡Feliz Cumpleaños!</h1>

            <div class="terminal-text" id="typewriter-text"></div>

            <!-- Evidencia Visual -->
            <div class="evidence-wrapper hidden" id="evidence-alert">
                <p class="instruction">> ABRIENDO ARCHIVO ADJUNTO: Untitled.png <br>> CARGANDO EVIDENCIA...</p>
                <div class="evidence-container">
                    <img src="Untitled.png" alt="Evidencia visual" class="evidence-image">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
